# version: '3.8'

services:
  event_db:
    image: postgres:15
    container_name: event-postgres
    # restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: event_backend
    command: npm run start:dev
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
     - .env
    depends_on:
      - event_db
volumes:
  postgres_data: